<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0f172a;
            color: #f8fafc;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: #3b82f6;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #f8fafc;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            color: #94a3b8;
            font-size: 1.125rem;
        }

        .btn {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">fiptask</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<main>
    <h1>Welcome</h1>
    <p>A simple place to start.</p>
    <a href="#" class="btn">Get Started</a>
</main>
</body>
</html>
